name: Deploy to GitHub Pages and CloudBase

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# 设置 GITHUB_TOKEN 权限
permissions:
  contents: read
  pages: write
  id-token: write

# 并发控制
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 构建并部署到 GitHub Pages
  deploy-github-pages:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # 部署到 CloudBase（可选，如果你仍需要）
  deploy-cloudbase:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli

      - name: Login to CloudBase
        run: tcb login --apiKeyId ${{ secrets.TCB_SECRET_ID }} --apiKey ${{ secrets.TCB_SECRET_KEY }}

      - name: Deploy to CloudBase Static Hosting
        run: tcb hosting deploy . /home -e ${{ secrets.TCB_ENV_ID }}

      - name: Deploy success notification
        if: success()
        run: echo "🎉 Deployed successfully to CloudBase!"
